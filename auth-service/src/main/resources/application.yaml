server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:couple_quest}?currentSchema=auth_service
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  liquibase:
    default-schema: auth_service
    change-log: classpath:/db/changelog/db.changelog-master.yml
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: auth_service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        acks: all
        linger.ms: 5
        request.timeout.ms: 30000
        delivery.timeout.ms: 60000
logging:
  level:
    org.springframework.boot.autoconfigure.liquibase: DEBUG
    liquibase: INFO
    org.liquibase: INFO
jwt:
  secret: 632eca39fc29068edc74133ca9cf8f40b4942191f80c0c78dd588835beb5f57b
  access:
    expiration_minutes: 30
  refresh:
    expiration_minutes: 44640 #31 day
email-verification:
  topic: auth.email-verification.requested
  code:
    length: 6
    ttl-minutes: 10
    max-attempts: 5
    resend-cooldown-seconds: 60
couple:
  invite:
    expiration-hours: 24