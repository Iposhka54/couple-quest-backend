server:
  port: 8085

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:couple_quest}?currentSchema=notification_service
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  liquibase:
    default-schema: notification_service
    change-log: classpath:/db/changelog/db.changelog-master.yml
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: notification_service
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ru.iposhka.dto.event*"
        spring.json.value.default.type: ru.iposhka.dto.event.EmailVerificationRequestedEvent
    listener:
      ack-mode: manual_immediate

app:
  kafka:
    topics:
      email-verification: auth.email-verification.requested
      couple-invite-accepted: auth.couple-invite.accepted
  email-jobs:
    poll-delay-ms: 1000
    batch-size: 100
    max-attempts: 3
    retry-delays-seconds: 10,60,300
    processing-timeout-seconds: 300
    worker:
      pool-size: 10
      queue-capacity: 1000
  mail:
    from: ${MAIL_FROM}
    project-name: ${MAIL_PROJECT_NAME}
    support-email: ${MAIL_SUPPORT_EMAIL}
    template:
      verification-code: "templates/email/verification-email.html"
      couple-invite-accepted: "templates/email/couple-invite-accepted.html"
    site-url: ${MAIL_SITE_URL:http://localhost:5173}

logging:
  level:
    ru.iposhka.notification: INFO