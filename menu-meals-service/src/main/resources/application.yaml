server:
  port: 8084
  servlet:
    context-path: /api

spring:
  application:
    name: menu-meals-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:couple_quest}?currentSchema=menu_meals_service
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  liquibase:
    default-schema: menu_meals_service
    change-log: classpath:/db/changelog/db.changelog-master.yml
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: menu_meals_service
logging:
  level:
    org.springframework.boot.autoconfigure.liquibase: DEBUG
    liquibase: INFO
    org.liquibase: INFO